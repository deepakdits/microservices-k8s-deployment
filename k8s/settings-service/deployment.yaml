apiVersion: apps/v1
kind: Deployment
metadata:
  name: settings-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: settings-service
  template:
    metadata:
      labels:
        app: settings-service
    spec:
      containers:
      - name: settings-service
        image: settings-service
        imagePullPolicy: Never
        ports:
        - containerPort: 3003
        env:
        - name: DB_HOST
          value: postgres
        - name: PORT
          value: "3003"